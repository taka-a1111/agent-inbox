<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Inbox — 対応待ち</title>
<style>
  :root{
    --bg:#0F1318; --panel:#181D25; --panel2:#212834;
    --ink:#E8ECF2; --ink2:#9AA4B2; --ink3:#616B7A;
    --line:#2A323D; --accent:#6B8AFF; --red:#FF6B6B; --green:#51CF66;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:sans-serif;font-size:16px;line-height:1.7}
  .wrap{max-width:640px;margin:0 auto;padding:14px 14px 60px}
  h1{font-size:18px;margin:6px 2px 12px;display:flex;align-items:center;justify-content:space-between}
  h1 .cnt{color:var(--ink2);font-size:14px;font-weight:normal}
  .toplink{display:block;text-align:center;border:1px solid var(--line);background:var(--panel);color:var(--ink2);
    text-decoration:none;padding:12px;border-radius:10px;margin-bottom:10px;font-size:14.5px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin:10px 0}
  .meta{font-size:14.5px;color:var(--ink)}
  .meta b{font-size:15.5px}
  .time{float:right;color:var(--ink3);font-size:12.5px}
  .cat{color:var(--ink2)}
  .sum{font-size:14.5px;color:var(--ink2);margin:8px 0 2px}
  textarea{width:100%;font-family:sans-serif;font-size:15.5px;line-height:1.7;padding:12px;margin-top:10px;
    border:1px solid var(--line);border-radius:10px;background:var(--panel2);color:var(--ink);min-height:200px;display:none}
  .btns{display:flex;gap:8px;margin-top:12px}
  .btn{flex:1;padding:13px 4px;font-size:14px;border-radius:10px;text-align:center;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink);text-decoration:none;cursor:pointer}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#0F1318;font-weight:bold}
  .btn:disabled{opacity:.5}
  .empty{text-align:center;color:var(--ink3);padding:56px 0;font-size:16px}
  .note{font-size:12.5px;color:var(--ink3);text-align:center;margin-top:18px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--panel2);
    border:1px solid var(--line);color:var(--ink);padding:10px 18px;border-radius:10px;font-size:14px;display:none}
  .histbtn{display:block;width:100%;margin-top:16px;padding:13px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink2);font-size:14.5px;cursor:pointer}
  .hrow{display:block;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:11px 12px;margin-top:8px;text-decoration:none}
  .hrow .l1{font-size:14px;color:var(--ink)}
  .hrow .l2{font-size:12.5px;color:var(--ink3);margin-top:3px}
  .st{font-size:12px;padding:1px 8px;border-radius:99px;margin-right:6px}
  .st.ok{background:rgba(81,207,102,.15);color:var(--green)}
  .st.open{background:rgba(107,138,255,.18);color:var(--accent)}
  .st.na{background:rgba(154,164,178,.15);color:var(--ink3)}
</style>
</head>
<body>
<div class="wrap">
  <h1>📥 対応待ち <span class="cnt" id="cnt"></span></h1>
  <a class="toplink" id="dash" href="#" target="_blank" style="display:none">📊 受信台帳を開く</a>
  <div id="list"><div class="empty">読み込み中…</div></div>
  <button class="histbtn" id="histBtn" style="display:none">✔ 履歴を表示</button>
  <div id="hist" style="display:none"></div>
  <p class="note">引き下げ更新の代わりに、画面を開き直すと最新になります。</p>
</div>
<div class="toast" id="toast"></div>

<script>
/* ====== 設定（自分の値に書き換える） ====== */
const GAS_URL = "https://script.google.com/macros/s/AKfycbyIMxJlaI626Rh4M2LSM0o63VSAGp8rKtWB_gzt0wvTD_6GnZdbX75okpXqPkrcvtmt/exec";
const TOKEN   = "973b2ec9a7d44575b09ed3c127a61aec";
/* ======================================== */

const $list = document.getElementById('list');
const $cnt = document.getElementById('cnt');
const $dash = document.getElementById('dash');
const $toast = document.getElementById('toast');

function toast(msg){ $toast.textContent = msg; $toast.style.display='block';
  setTimeout(()=>{ $toast.style.display='none'; }, 1800); }

function fmtTime(ms){ if(!ms) return '';
  const d = new Date(ms);
  return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function load(){
  try{
    const res = await fetch(`${GAS_URL}?action=list&t=${encodeURIComponent(TOKEN)}`);
    const data = await res.json();
    if(!data.ok) throw new Error(data.error||'error');
    render(data);
  }catch(e){
    $list.innerHTML = `<div class="empty">読み込みに失敗しました<br><span style="font-size:13px">${esc(e.message)}</span></div>`;
  }
}

const $histBtn = document.getElementById('histBtn');
const $hist = document.getElementById('hist');
let histOpen = false;
$histBtn.addEventListener('click', ()=>{
  histOpen = !histOpen;
  $hist.style.display = histOpen ? 'block' : 'none';
  $histBtn.textContent = histOpen ? '✔ 履歴を隠す' : `✔ 履歴を表示（直近${$hist.childElementCount}件）`;
});

function stBadge(status){
  if(status==='送信済み'||status==='完了') return `<span class="st ok">${status}</span>`;
  if(status==='未対応') return `<span class="st open">未対応</span>`;
  return `<span class="st na">${esc(status||'—')}</span>`;
}

function renderHistory(history){
  if(!history || history.length===0){ $histBtn.style.display='none'; $hist.style.display='none'; return; }
  $hist.innerHTML = '';
  history.forEach(h=>{
    const el = document.createElement(h.link ? 'a' : 'div');
    el.className = 'hrow';
    if(h.link){ el.href = h.link; el.target = '_blank'; }
    el.innerHTML =
      `<div class="l1">${stBadge(h.status)}<b>${esc(h.client)}</b>${h.case_name && h.case_name!=='—' ? '｜'+esc(h.case_name):''}${h.category?'｜'+esc(h.category):''}</div>`+
      `<div class="l2">${esc(h.date)}　${esc(h.summary).slice(0,60)}</div>`;
    $hist.appendChild(el);
  });
  $histBtn.style.display='block';
  $histBtn.textContent = histOpen ? '✔ 履歴を隠す' : `✔ 履歴を表示（直近${history.length}件）`;
}

function render(data){
  renderHistory(data.history);
  $cnt.textContent = data.items.length ? `${data.items.length}件` : '';
  if(data.dash){ $dash.href = data.dash; $dash.style.display='block'; }
  if(data.items.length===0){ $list.innerHTML = '<div class="empty">🎉 未処理はありません</div>'; return; }

  $list.innerHTML = '';
  data.items.forEach(it=>{
    const card = document.createElement('div');
    card.className = 'card';
    const isRecord = it.mode === 'record';
    const isNoReply = it.category === '対応不要';
    const openHref = isRecord ? (it.site_link || '#') : `https://www.chatwork.com/#!rid${it.target_room_id}`;
    card.innerHTML =
      `<div class="meta"><b>${esc(it.client_name)}</b>｜${esc(it.room_name)}`+
      (it.category?`｜<span class="cat">${esc(it.category)}</span>`:'')+
      `<span class="time">${fmtTime(it.created)}</span></div>`+
      (it.summary?`<div class="sum">${esc(it.summary)}</div>`:'')+
      (isNoReply?`<div class="sum" style="color:var(--ink3)">返信は不要です。「消化」で台帳に記録してカードを片付けます（送信は行われません）</div>`:
       isRecord?`<div class="sum" style="color:var(--accent)">サイトで返信後、送った文面を下に貼って記録してください（ドラフトのまま記録も可）</div>`:'')+
      `<textarea></textarea>`+
      `<div class="btns">`+
      (isNoReply
        ? `<button class="btn primary btn-dismiss">✔ 消化（対応不要で記録）</button>`+
          `<a class="btn" href="${openHref}" target="_blank">${isRecord?'🔗 サイト':'💬 ルーム'}</a>`
        : `<button class="btn primary btn-send">${isRecord?'✔ 対応内容を記録':'✅ 送信'}</button>`+
          `<button class="btn btn-dismiss">🗑 不要</button>`+
          `<button class="btn btn-copy">📋 コピー</button>`+
          `<a class="btn" href="${openHref}" target="_blank">${isRecord?'🔗 サイト':'💬 ルーム'}</a>`)+
      `</div>`;
    const ta = card.querySelector('textarea');
    ta.value = it.draft;

    // ★消化ボタン（全カード共通。1回目=確認、2回目=実行。Chatworkへの投稿は一切しない）
    const dismissBtn = card.querySelector('.btn-dismiss');
    if(dismissBtn){
      const confirmLabel = isNoReply ? '✔ 対応不要で確定' : '🗑 不要で確定';
      dismissBtn.addEventListener('click', async ()=>{
        if(!dismissBtn.dataset.armed){
          dismissBtn.dataset.armed = '1';
          dismissBtn.textContent = confirmLabel;
          return;
        }
        dismissBtn.disabled = true; dismissBtn.textContent = '記録中…';
        try{
          const res = await fetch(GAS_URL, { method:'POST',
            headers:{'Content-Type':'text/plain'},
            body: JSON.stringify({ action:'dismiss', t:TOKEN, id:it.id }) });
          const r = await res.json();
          if(!r.ok) throw new Error(r.error||'error');
          card.style.opacity=.35; card.querySelector('.btns').innerHTML=`<div style="color:var(--green);text-align:center;width:100%">✔ 対応不要で記録しました</div>`;
          toast('対応不要として記録しました');
          setTimeout(()=>{ card.remove(); const n=$list.querySelectorAll('.card').length;
            $cnt.textContent = n?`${n}件`:''; if(!n) $list.innerHTML='<div class="empty">🎉 未処理はありません</div>'; }, 900);
        }catch(e){
          dismissBtn.disabled=false; dismissBtn.textContent = confirmLabel;
          toast('記録に失敗: '+e.message);
        }
      });
    }
    if(isNoReply){
      $list.appendChild(card);
      return;
    }

    const sendBtn = card.querySelector('.btn-send');

    // 1回目のタップ＝本文を開いて確認/編集モードへ、2回目＝送信実行
    sendBtn.addEventListener('click', async ()=>{
      if(ta.style.display!=='block'){
        ta.style.display='block';
        sendBtn.textContent = isRecord ? '✔ 記録して完了' : '✅ この内容で送信';
        return;
      }
      sendBtn.disabled = true; sendBtn.textContent = isRecord ? '記録中…' : '送信中…';
      try{
        const res = await fetch(GAS_URL, { method:'POST',
          headers:{'Content-Type':'text/plain'},
          body: JSON.stringify({ action:'send', t:TOKEN, id:it.id, body:ta.value }) });
        const r = await res.json();
        if(!r.ok) throw new Error(r.error||'error');
        card.style.opacity=.35; card.querySelector('.btns').innerHTML=`<div style="color:var(--green);text-align:center;width:100%">${isRecord?'✔ 記録しました':'✔ 送信しました'}</div>`;
        toast(isRecord?'記録しました':'送信しました');
        setTimeout(()=>{ card.remove(); const n=$list.querySelectorAll('.card').length;
          $cnt.textContent = n?`${n}件`:''; if(!n) $list.innerHTML='<div class="empty">🎉 未処理はありません</div>'; }, 900);
      }catch(e){
        sendBtn.disabled=false; sendBtn.textContent = isRecord ? '✔ 記録して完了' : '✅ この内容で送信';
        toast((isRecord?'記録':'送信')+'に失敗: '+e.message);
      }
    });

    card.querySelector('.btn-copy').addEventListener('click', ()=>{
      navigator.clipboard.writeText(ta.value).then(()=>toast('コピーしました'))
        .catch(()=>{ ta.style.display='block'; ta.select(); document.execCommand('copy'); toast('コピーしました'); });
    });

    $list.appendChild(card);
  });
}

document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) load(); });
load();
</script>
</body>
</html>
